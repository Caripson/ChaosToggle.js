name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Check bundle size
        if: matrix.node-version == 20
        run: |
          ls -lh dist/chaos-toggle.min.js
          SIZE=$(wc -c < dist/chaos-toggle.min.js)
          echo "Bundle size: ${SIZE} bytes"
